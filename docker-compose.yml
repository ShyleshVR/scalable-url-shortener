version: '3.8'

services:

  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: url_shortener
    ports:
      - "3307:3306"

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: url-shortener
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    environment:
      DB_URL: jdbc:mysql://mysql:3306/url_shortener
      DB_USERNAME: root
      DB_PASSWORD: root

      REDIS_HOST: redis
      REDIS_PORT: 6379