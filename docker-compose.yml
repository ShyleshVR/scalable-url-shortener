services:

  mysql:
    image: mysql:8.4
    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: url_shortener

    ports:
      - "3307:3306"

    volumes:
    - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: redis

    ports:
      - "6379:6379"

  app:
    build: .

    container_name: url-shortener

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

      redis:
        condition: service_started

    environment:
      DB_URL: jdbc:mysql://mysql:3306/url_shortener
      DB_USERNAME: root
      DB_PASSWORD: root

      REDIS_HOST: redis
      REDIS_PORT: 6379
  
volumes:
  mysql_data: